name: MoneyFly Build

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android APK and AAB
        required: true
        type: boolean
        default: true
      build_macos:
        description: Build macOS DMG
        required: true
        type: boolean
        default: true
      build_windows:
        description: Build Windows portable ZIP
        required: true
        type: boolean
        default: true
      build_windows7:
        description: Attempt Windows 7 legacy package after compatibility checks
        required: true
        type: boolean
        default: false
      publish_release:
        description: Publish build files to GitHub Releases
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
      - master
      - dev
      - moneyfly-build

permissions:
  contents: write

concurrency:
  group: moneyfly-build-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: "MoneyFly"
  APP_VERSION: "1.0.0"
  FLUTTER_VERSION: "3.38.5"
  JAVA_VERSION: "17"
  ANDROID_NDK_VERSION: "28.2.13676358"
  BUILD_TARGET: "lib/main.dart"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Validate Flutter sources
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run slang
          flutter test
          flutter analyze --no-fatal-infos

  android:
    name: Android
    if: github.event_name != 'workflow_dispatch' || inputs.build_android
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Flutter sources
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run slang

      - name: Download Android core
        shell: bash
        run: |
          set -euo pipefail
          CORE_VERSION="$(grep '^core.version=' dependencies.properties | cut -d= -f2)"
          CORE_URL="https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}"
          mkdir -p android/app/libs
          curl -L "${CORE_URL}/hiddify-lib-android.tar.gz" | tar xz -C android/app/libs
          STRIP="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          find android/app/libs -name '*.so' -print -exec "${STRIP}" --strip-unneeded {} \;
          ls -la android/app/libs

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_SIGNING_KEY:-}" && -n "${ANDROID_SIGNING_STORE_PASSWORD:-}" && -n "${ANDROID_SIGNING_KEY_PASSWORD:-}" && -n "${ANDROID_SIGNING_KEY_ALIAS:-}" ]]; then
            echo "${ANDROID_SIGNING_KEY}" | base64 --decode > android/moneyfly-release.jks
            {
              echo "storeFile=$(pwd)/android/moneyfly-release.jks"
              echo "storePassword=${ANDROID_SIGNING_STORE_PASSWORD}"
              echo "keyPassword=${ANDROID_SIGNING_KEY_PASSWORD}"
              echo "keyAlias=${ANDROID_SIGNING_KEY_ALIAS}"
            } > android/key.properties
            echo "Using Android signing key from repository secrets."
          else
            keytool -genkeypair -v \
              -keystore android/moneyfly-ci-release.jks \
              -storepass moneyfly-ci-store-password \
              -keypass moneyfly-ci-store-password \
              -alias moneyfly-ci \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=MoneyFly CI, OU=MoneyFly, O=MoneyFly, L=Shenzhen, ST=Guangdong, C=CN"
            {
              echo "storeFile=$(pwd)/android/moneyfly-ci-release.jks"
              echo "storePassword=moneyfly-ci-store-password"
              echo "keyPassword=moneyfly-ci-store-password"
              echo "keyAlias=moneyfly-ci"
            } > android/key.properties
            echo "Using generated CI Android signing key. Add ANDROID_SIGNING_* secrets for production signing."
          fi
          chmod 600 android/*.jks android/key.properties

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/moneyfly-apk-cache
          flutter build apk \
            --release \
            --target "${BUILD_TARGET}" \
            --target-platform android-arm,android-arm64,android-x64 \
            --build-name="${APP_VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --split-debug-info=build/debug-info/android/universal \
            --dart-define="moneyfly_build_number=${GITHUB_RUN_NUMBER}" \
            --dart-define=sentry_dsn=
          cp build/app/outputs/flutter-apk/app-release.apk build/moneyfly-apk-cache/app-release.apk
          flutter build apk \
            --release \
            --split-per-abi \
            --target "${BUILD_TARGET}" \
            --target-platform android-arm,android-arm64,android-x64 \
            --build-name="${APP_VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --split-debug-info=build/debug-info/android/split \
            --dart-define="moneyfly_build_number=${GITHUB_RUN_NUMBER}" \
            --dart-define=sentry_dsn=

      - name: Build AAB
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --target "${BUILD_TARGET}" \
            --build-name="${APP_VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --split-debug-info=build/debug-info/android/aab \
            --dart-define="moneyfly_build_number=${GITHUB_RUN_NUMBER}" \
            --dart-define=sentry_dsn=

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/android
          cp build/moneyfly-apk-cache/app-release.apk "artifacts/android/${APP_NAME}-Android-universal.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "artifacts/android/${APP_NAME}-Android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "artifacts/android/${APP_NAME}-Android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "artifacts/android/${APP_NAME}-Android-x86_64.apk"
          cp build/app/outputs/bundle/release/app-release.aab "artifacts/android/${APP_NAME}-Android.aab"
          for apk in artifacts/android/*.apk; do
            "${ANDROID_HOME}/build-tools/36.0.0/apksigner" verify --verbose "$apk"
          done
          jarsigner -verify -certs "artifacts/android/${APP_NAME}-Android.aab"
          ls -la artifacts/android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moneyfly-android
          path: artifacts/android/*
          retention-days: 14
          overwrite: true

  macos:
    name: macOS
    if: github.event_name != 'workflow_dispatch' || inputs.build_macos
    needs: quality
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Flutter sources
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-macos-desktop
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run slang

      - name: Download macOS core
        shell: bash
        run: |
          set -euo pipefail
          CORE_VERSION="$(grep '^core.version=' dependencies.properties | cut -d= -f2)"
          CORE_URL="https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}"
          mkdir -p hiddify-core/bin
          curl -L "${CORE_URL}/hiddify-lib-macos.tar.gz" | tar xz -C hiddify-core/bin
          while IFS= read -r file; do
            if file "${file}" | grep -q 'Mach-O'; then
              strip -x "${file}" || true
            fi
          done < <(find hiddify-core/bin -type f)
          ls -la hiddify-core/bin

      - name: Build macOS app
        shell: bash
        run: |
          set -euo pipefail
          flutter build macos \
            --release \
            --target "${BUILD_TARGET}" \
            --build-name="${APP_VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --split-debug-info=build/debug-info/macos \
            --dart-define="moneyfly_build_number=${GITHUB_RUN_NUMBER}" \
            --dart-define=sentry_dsn=

      - name: Collect macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          if [[ ! -d "${APP_PATH}" ]]; then
            APP_PATH="build/macos/Build/Products/Release/Hiddify.app"
          fi
          test -d "${APP_PATH}"
          SOURCE_ICONSET="macos/Runner/Assets.xcassets/AppIcon.appiconset"
          python3 scripts/rebuild_macos_icns.py "${SOURCE_ICONSET}" "${APP_PATH}/Contents/Resources/AppIcon.icns"
          ICONSET_DIR="$(mktemp -d)"
          iconutil -c iconset -o "${ICONSET_DIR}/AppIcon.iconset" "${APP_PATH}/Contents/Resources/AppIcon.icns"
          find "${ICONSET_DIR}/AppIcon.iconset" -maxdepth 1 -type f -print
          python3 - "${ICONSET_DIR}/AppIcon.iconset" <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          iconset = Path(sys.argv[1])
          for png in iconset.glob("*.png"):
              output = subprocess.check_output(
                  ["sips", "-g", "pixelWidth", "-g", "pixelHeight", str(png)],
                  text=True,
              )
              if "pixelWidth: 1024" in output and "pixelHeight: 1024" in output:
                  print(f"Found 1024x1024 icon: {png.name}")
                  break
          else:
              raise SystemExit("AppIcon.icns does not contain a 1024x1024 bitmap")
          PY
          codesign --force --deep --sign - "${APP_PATH}" || true
          mkdir -p artifacts/macos
          DMG_DIR="$(mktemp -d)"
          ditto "${APP_PATH}" "${DMG_DIR}/${APP_NAME}.app"
          ln -s /Applications "${DMG_DIR}/Applications"
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${DMG_DIR}" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            "artifacts/macos/${APP_NAME}-macOS-universal.dmg"
          pkgbuild \
            --install-location /Applications \
            --component "${DMG_DIR}/${APP_NAME}.app" \
            "artifacts/macos/${APP_NAME}-macOS-universal.pkg"
          ls -la artifacts/macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneyfly-macos
          path: artifacts/macos/*
          retention-days: 14
          overwrite: true

  windows:
    name: Windows
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows || inputs.build_windows7
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Flutter sources
        shell: pwsh
        run: |
          flutter --version
          flutter config --enable-windows-desktop
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run slang

      - name: Download Windows core
        shell: pwsh
        run: |
          $coreLine = Get-Content dependencies.properties | Where-Object { $_ -match '^core\.version=' } | Select-Object -First 1
          $coreVersion = $coreLine.Split('=')[1].Trim()
          $coreUrl = "https://github.com/hiddify/hiddify-next-core/releases/download/v$coreVersion"
          New-Item -ItemType Directory -Path hiddify-core\bin -Force | Out-Null
          curl.exe -L "$coreUrl/hiddify-lib-windows-amd64.tar.gz" -o hiddify-lib-windows-amd64.tar.gz
          tar -xzf hiddify-lib-windows-amd64.tar.gz -C hiddify-core\bin
          Get-ChildItem hiddify-core\bin

      - name: Build Windows app
        shell: pwsh
        run: |
          flutter build windows `
            --release `
            --target "${env:BUILD_TARGET}" `
            --build-name="${env:APP_VERSION}" `
            --build-number="${env:GITHUB_RUN_NUMBER}" `
            --split-debug-info=build\debug-info\windows `
            --dart-define="moneyfly_build_number=${env:GITHUB_RUN_NUMBER}" `
            --dart-define=sentry_dsn=

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $exePath = Join-Path $releaseDir "${env:APP_NAME}.exe"
          if (!(Test-Path $exePath)) {
            Get-ChildItem -Recurse build\windows | Select-Object FullName
            throw "Windows release executable was not generated."
          }
          Get-ChildItem -Path $releaseDir -Recurse -Include *.pdb,*.exp,*.lib -File | Remove-Item -Force
          New-Item -ItemType Directory -Path artifacts\windows -Force | Out-Null
          7z a -tzip -mx=9 "artifacts\windows\${env:APP_NAME}-Windows-x64-Portable.zip" "$releaseDir\*" | Out-Host
          $appVersion = "${env:APP_VERSION}"
          $sourceDir = (Resolve-Path $releaseDir).Path
          $outputDir = (Resolve-Path artifacts\windows).Path
          $iconPath = (Resolve-Path "windows\runner\resources\app_icon.ico").Path
          $issPath = Join-Path $env:RUNNER_TEMP "moneyfly-installer.iss"
          @"
          [Setup]
          AppId={{A826F4E6-E142-4B9D-9F9D-17304829F2B1}
          AppName=${env:APP_NAME}
          AppVersion=$appVersion
          AppPublisher=MoneyFly
          AppPublisherURL=https://dy.moneyfly.top
          AppSupportURL=https://dy.moneyfly.top
          AppUpdatesURL=https://dy.moneyfly.top
          DefaultDirName={autopf64}\MoneyFly
          MinVersion=10.0
          DisableProgramGroupPage=yes
          OutputDir=$outputDir
          OutputBaseFilename=${env:APP_NAME}-Windows-x64-Setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=$iconPath
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          CloseApplications=force

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce

          [Files]
          Source: "$sourceDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\${env:APP_NAME}"; Filename: "{app}\${env:APP_NAME}.exe"
          Name: "{autodesktop}\${env:APP_NAME}"; Filename: "{app}\${env:APP_NAME}.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\${env:APP_NAME}.exe"; Description: "{cm:LaunchProgram,${env:APP_NAME}}"; Flags: nowait postinstall skipifsilent

          [UninstallDelete]
          Type: filesandordirs; Name: "{userappdata}\MoneyFly"

          [Code]
          function InitializeSetup(): Boolean;
          var
            ResultCode: Integer;
          begin
            Exec('taskkill', '/F /IM MoneyFly.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('taskkill', '/F /IM hiddify.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('net', 'stop "HiddifyTunnelService"', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('sc.exe', 'delete "HiddifyTunnelService"', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Result := True;
          end;
          "@ | Set-Content -Path $issPath -Encoding UTF8
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc $issPath
          Get-ChildItem artifacts\windows

      - name: Check Windows 7 compatibility
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          New-Item -ItemType Directory -Path artifacts\windows7-check -Force | Out-Null
          python scripts\check_windows7_compat.py `
            --release-dir "$releaseDir" `
            --manifest windows\runner\runner.exe.manifest `
            --installer-min-version 10.0 `
            --flutter-version "${env:FLUTTER_VERSION}" `
            --json artifacts\windows7-check\windows7-compatibility.json `
            --markdown artifacts\windows7-check\Windows7-Compatibility.md

      - name: Build Windows 7 legacy package
        if: github.event_name == 'workflow_dispatch' && inputs.build_windows7
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          python scripts\check_windows7_compat.py `
            --release-dir "$releaseDir" `
            --manifest windows\runner\runner.exe.manifest `
            --installer-min-version 6.1 `
            --flutter-version "${env:FLUTTER_VERSION}" `
            --json artifacts\windows7-check\windows7-legacy-compatibility.json `
            --markdown artifacts\windows7-check\Windows7-Legacy-Compatibility.md `
            --fail-on-incompatible

          7z a -tzip -mx=9 "artifacts\windows\${env:APP_NAME}-Windows7-x64-Portable.zip" "$releaseDir\*" | Out-Host

          $appVersion = "${env:APP_VERSION}"
          $sourceDir = (Resolve-Path $releaseDir).Path
          $outputDir = (Resolve-Path artifacts\windows).Path
          $iconPath = (Resolve-Path "windows\runner\resources\app_icon.ico").Path
          $issPath = Join-Path $env:RUNNER_TEMP "moneyfly-windows7-installer.iss"
          @"
          [Setup]
          AppId={{A826F4E6-E142-4B9D-9F9D-17304829F2B1}
          AppName=${env:APP_NAME}
          AppVersion=$appVersion
          AppPublisher=MoneyFly
          AppPublisherURL=https://dy.moneyfly.top
          AppSupportURL=https://dy.moneyfly.top
          AppUpdatesURL=https://dy.moneyfly.top
          DefaultDirName={autopf64}\MoneyFly
          MinVersion=6.1
          DisableProgramGroupPage=yes
          OutputDir=$outputDir
          OutputBaseFilename=${env:APP_NAME}-Windows7-x64-Setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=$iconPath
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          CloseApplications=force

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce

          [Files]
          Source: "$sourceDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\${env:APP_NAME}"; Filename: "{app}\${env:APP_NAME}.exe"
          Name: "{autodesktop}\${env:APP_NAME}"; Filename: "{app}\${env:APP_NAME}.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\${env:APP_NAME}.exe"; Description: "{cm:LaunchProgram,${env:APP_NAME}}"; Flags: nowait postinstall skipifsilent

          [UninstallDelete]
          Type: filesandordirs; Name: "{userappdata}\MoneyFly"

          [Code]
          function InitializeSetup(): Boolean;
          var
            ResultCode: Integer;
          begin
            Exec('taskkill', '/F /IM MoneyFly.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('taskkill', '/F /IM hiddify.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('net', 'stop "HiddifyTunnelService"', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Exec('sc.exe', 'delete "HiddifyTunnelService"', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            Result := True;
          end;
          "@ | Set-Content -Path $issPath -Encoding UTF8
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc $issPath
          Get-ChildItem artifacts\windows

      - name: Upload Windows 7 compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moneyfly-windows7-compatibility
          path: artifacts/windows7-check/*
          retention-days: 14
          overwrite: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneyfly-windows
          path: artifacts/windows/*
          retention-days: 14
          overwrite: true

  publish:
    name: Publish Release
    needs:
      - android
      - macos
      - windows
    if: ${{ always() && !cancelled() && !failure() && (github.event_name != 'workflow_dispatch' || inputs.publish_release) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f \( \
            -name 'Windows7-Compatibility.md' -o \
            -name 'Windows7-Legacy-Compatibility.md' -o \
            -name 'windows7-compatibility.json' -o \
            -name 'windows7-legacy-compatibility.json' \
          \) -delete
          find release-assets -maxdepth 2 -type f -print
          RELEASE_VERSION="${APP_VERSION}+${GITHUB_RUN_NUMBER}"
          TAG="v${RELEASE_VERSION}"
          cat > release-notes.md <<EOF
          MoneyFly ${RELEASE_VERSION} automated build from commit ${GITHUB_SHA}.

          Assets:
          - MoneyFly-Android-arm64-v8a.apk: smaller Android package for most modern phones
          - MoneyFly-Android-armeabi-v7a.apk: smaller Android package for older 32-bit phones
          - MoneyFly-Android-x86_64.apk: Android package for x86_64 devices/emulators
          - MoneyFly-Android-universal.apk: larger Android package containing all CPU architectures
          - MoneyFly-Android.aab: Android App Bundle for store upload
          - MoneyFly-macOS-universal.dmg: macOS drag-and-drop installer for Intel and Apple Silicon when supported by the bundled core
          - MoneyFly-macOS-universal.pkg: macOS package installer
          - MoneyFly-Windows-x64-Setup.exe: Windows 10/11 x64 installer
          - MoneyFly-Windows-x64-Portable.zip: Windows 10/11 x64 portable package
          - MoneyFly-Windows7-x64-Setup.exe: optional Windows 7 legacy installer, only produced when workflow_dispatch build_windows7 passes
          - MoneyFly-Windows7-x64-Portable.zip: optional Windows 7 legacy portable package, only produced when workflow_dispatch build_windows7 passes
          - SHA256SUMS.txt: checksums for all release assets

          Note: Windows 7/8 are not supported by the current Flutter 3.38.5 desktop toolchain. The Windows 7 legacy package is gated by static compatibility checks and still requires runtime verification in a real Windows 7 SP1 VM.
          EOF
          python3 - <<'PY'
          import os
          from pathlib import Path

          app_version = os.environ["APP_VERSION"]
          build_number = os.environ["GITHUB_RUN_NUMBER"]
          major, minor, _ = app_version.split(".", 2)
          version = f"{major}.{minor}.{build_number}"
          appcast = Path("appcast.xml")
          text = appcast.read_text()
          import re
          text = re.sub(r"<title>Version [^<]+</title>", f"<title>Version {version}</title>", text)
          text = re.sub(r'sparkle:version="[^"]+"', f'sparkle:version="{version}"', text)
          appcast.write_text(text)
          PY
          cp appcast.xml release-assets/appcast.xml
          (cd release-assets && find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)
          gh release delete "${TAG}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y || true
          gh release create "${TAG}" \
            release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MoneyFly ${RELEASE_VERSION}" \
            --notes-file release-notes.md \
            --latest
