display_name: MoneyFly
package_name: moneyfly
maintainer:
  name: MoneyFly
  email: support@moneyfly.top

priority: optional
section: x11
installed_size: 6604
essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up MoneyFly..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=top.moneyfly.app' "/usr/share/applications/moneyfly.desktop"
  - echo "Search and remove old desktop files from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/moneyfly.desktop" ]; then rm -f "$user_dir/.local/share/applications/moneyfly.desktop"; echo "Found and removed moneyfly.desktop from $user_dir .local"; fi; done
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/hiddify.desktop" ]; then rm -f "$user_dir/.local/share/applications/hiddify.desktop"; echo "Found and removed old hiddify.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "MoneyFly is ready to use."

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove MoneyFly configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing MoneyFly user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/moneyfly" ]; then rm -rf "$user_dir/.local/share/moneyfly"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/moneyfly
  - echo "MoneyFly data cleanup complete."

